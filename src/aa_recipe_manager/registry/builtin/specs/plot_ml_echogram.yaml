op: plot_ml_echogram
description: >
  Render a normalized ML feature echogram for inspection.
  This is a sink step: it produces a side-effect (figure) with no data output.
category: visualization
sink: true
inputs:
  ds_normalized:
    type: Dataset
  ds_Sv:
    type: Dataset
    description: Original Sv dataset used for depth and coordinate reference
outputs: {}
params:
  dataset_name:
    type: str
    required: true
  normalization_name:
    type: str
    required: true
  min_depth:
    type: float
    required: false
    default: 0
  max_depth:
    type: float
    required: true
  ping_min:
    type: int
    required: false
    default: 0
  ping_max:
    type: int
    required: true
  x_axis_units:
    type: str
    required: false
    default: "seconds"
  y_axis_units:
    type: str
    required: false
    default: "meters"
implementations:
  - key: default
    callable_path: aa_si_visualization.echogram.plot_flattened_data_echogram
    default: true
    dependency:
      name: aa-si-visualization
      version: ">=0.1.0"
      source: git
      url: https://github.com/BLayman-NOAA/AA-SI_Visualization.git
    param_map:
      ds_normalized: ds_ml
      dataset_name: ml_dataset_name
      normalization_name: ml_specific_data_name
      ds_Sv: ds_Sv_original
