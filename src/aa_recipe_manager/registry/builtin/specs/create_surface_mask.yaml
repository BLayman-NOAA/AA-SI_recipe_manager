op: create_surface_mask
description: >
  Build a surface-interference mask from baseline Sv using a selectable method.
category: masking
inputs:
  ds_Sv:
    type: Dataset
outputs:
  mask:
    type: DataArray
    description: Boolean mask DataArray; True means valid data
params:
  surface_depth_m:
    type: float
    units: m
    required: false
    default: 0.0
implementations:
  - key: default
    callable_path: aa_si_utils.utils.create_surface_mask
    default: true
    dependency:
      name: aa-si-utils
      version: ">=0.1.0"
      source: git
      url: https://github.com/nmfs-ost/AA-SI_Utils.git
    output_map:
      mask: __return__
