op: apply_sv_mask
description: >
  Apply a boolean mask to an Sv Dataset, setting masked samples to NaN.
category: masking
inputs:
  ds_Sv:
    type: Dataset
    expected_variables:
      - Sv
  mask:
    type: DataArray
outputs:
  ds_Sv:
    type: Dataset
    description: Sv Dataset with masked samples set to NaN
    expected_variables:
      - Sv
params: {}
implementations:
  - key: default
    callable_path: aa_si_utils.utils.apply_mask_to_sv
    default: true
    dependency:
      name: aa-si-utils
      version: ">=0.1.0"
      source: git
      url: https://github.com/nmfs-ost/AA-SI_Utils.git
    output_map:
      ds_Sv: __return__
